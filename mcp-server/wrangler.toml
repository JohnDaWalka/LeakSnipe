name = "leaksnipe"
main = "src/mcp-worker.js"
compatibility_date = "2026-07-14"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true

# Route for the worker subdomain
[[routes]]
pattern = "worker.leaksnipe.win"
custom_domain = true
zone_name = "leaksnipe.win"

# Default Worker limit is too low for D1 coaching queries
[limits]
cpu_ms = 50

[placement]
mode = "smart"

[[r2_buckets]]
binding = "HAND_HISTORY_R2"
bucket_name = "leaksnipe-hand-histories"

[[r2_buckets]]
binding = "R2_POKER_HH"
bucket_name = "poker-hand-histories"

[[r2_buckets]]
binding = "R2_POKER_HANDS"
bucket_name = "poker-hands"

# Hot/Warm/Cold storage tiers for lifecycle management
[[r2_buckets]]
binding = "HAND_HISTORY_HOT"
bucket_name = "leaksnipe-hand-histories-hot"

[[r2_buckets]]
binding = "HAND_HISTORY_WARM"
bucket_name = "leaksnipe-hand-histories-warm"

[[r2_buckets]]
binding = "HAND_HISTORY_COLD"
bucket_name = "leaksnipe-hand-histories-cold"

# NEW: Specialized R2 buckets
[[r2_buckets]]
binding = "R2_AI_OUTPUTS"
bucket_name = "leaksnipe-ai-outputs"

[[r2_buckets]]
binding = "R2_MEDIA"
bucket_name = "leaksnipe-media"

[[r2_buckets]]
binding = "R2_BACKUPS"
bucket_name = "leaksnipe-backups"

[[kv_namespaces]]
binding = "HAND_HISTORY_KV"
id = "c13121512b8e4519ae9b3a3a52daeed1"

[[kv_namespaces]]
binding = "HAND_HISTORY_KV_ANALYTICS"
id = "4ea8afb5b3b644f487a26ed1abc08804"

# Enhanced architecture namespaces
[[kv_namespaces]]
binding = "HAND_META"          # ← leaksnipe-kv-hand-meta
id = "c12fd079fea242468a2773eb4e198508"

[[kv_namespaces]]
binding = "PLAYERS"            # ← leaksnipe-kv-players
id = "826bc87bdab34f788fc2a628cfcd7d2c"

[[kv_namespaces]]
binding = "SESSIONS"           # ← leaksnipe-kv-sessions
id = "9bf773b24d3c40c3b11d34b484007a84"

[[kv_namespaces]]
binding = "AI_INSIGHTS"        # ← leaksnipe-kv-ai
id = "044b2e1a90e043d7b8c7f84607cc1c3a"

[[kv_namespaces]]
binding = "HOT_CACHE"          # ← leaksnipe-kv-hot (optional)
id = "6f3de61aa62540008efc29367e11bc43"

# Full coaching schema (hands + ai_analysis + coach_memory + catalog)
[[d1_databases]]
binding = "DB"
database_name = "leaksnipe-hands"
database_id = "9a9ba1db-5e5e-4fd7-9ff4-bcd6e25ddc2e"
migrations_dir = "../cloudflare-api/migrations"

[[analytics_engine_datasets]]
binding = "ANALYTICS_DB"
dataset = "d1_Databases"

[vars]
BACKFILL_ADMIN_KEY = "leaksnipe-admin-key-999"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1
