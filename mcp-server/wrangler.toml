name = "leaksnipe"
main = "src/mcp-worker.js"
compatibility_date = "2026-07-14"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

# Route(s) for this worker are already configured on the leaksnipe.win zone
# (dashboard-managed or from an earlier deploy). Declaring them here too makes
# `wrangler deploy`'s route-sync step fail with 409 Conflict on every deploy —
# harmless (nothing is created/changed when it fails), but noisy. Manage
# routes/custom domains via the dashboard instead of wrangler.toml.

[limits]
cpu_ms = 1

[placement]
mode = "smart"

[[durable_objects.bindings]]
name = "Durable_Container"
class_name = "MyContainer"
script_name = "containers-template"

[[r2_buckets]]
binding = "HAND_HISTORY_R2"
bucket_name = "leaksnipe-hand-histories"

[[r2_buckets]]
binding = "R2_POKER_HH"
bucket_name = "poker-hand-histories"

[[r2_buckets]]
binding = "R2_POKER_HANDS"
bucket_name = "poker-hands"

[[kv_namespaces]]
binding = "HAND_HISTORY_KV"
id = "c13121512b8e4519ae9b3a3a52daeed1"

[[d1_databases]]
binding = "DB"
database_name = "leaksnipe-hands"
database_id = "9a9ba1db-5e5e-4fd7-9ff4-bcd6e25ddc2e"
